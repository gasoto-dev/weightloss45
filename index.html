<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kickstart" />
<meta name="theme-color" content="#0E1B24" />
<title>45-Day Kickstart</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0E1B24; --panel:#152A34; --panel2:#1B3543; --line:#24404E;
    --ink:#EAF2F4; --muted:#7E97A1; --done:#2FD3A5; --gold:#F2B441;
    --legs:#FF6B4A; --cardio:#38BDF8; --upper:#A78BFA; --recovery:#5B7686; --finish:#F2B441;
    --cond:'Barlow Condensed',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);}
  body{padding:max(20px,env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto;}
  .eyebrow{font-family:var(--cond);font-size:11px;letter-spacing:2px;color:var(--muted);font-weight:600;}
  h1{font-family:var(--cond);font-size:40px;font-weight:700;letter-spacing:1px;line-height:1;margin:2px 0 0;}
  .sub{font-size:13px;color:var(--muted);margin-top:4px;margin-bottom:18px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;}
  .cardTitle{font-family:var(--cond);font-size:22px;font-weight:600;letter-spacing:.5px;}
  .hero{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;}
  .heroLabel{font-family:var(--cond);color:var(--muted);font-size:15px;letter-spacing:1px;font-weight:600;}
  .bigNum{font-family:var(--cond);font-size:52px;font-weight:700;line-height:1;letter-spacing:1px;}
  .slash{font-family:var(--cond);font-size:26px;color:var(--muted);font-weight:600;margin-left:6px;}
  .stats{display:flex;gap:8px;}
  .stat{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:60px;text-align:center;}
  .stat b{font-family:var(--cond);font-size:26px;font-weight:700;line-height:1;display:block;}
  .stat span{font-family:var(--cond);font-size:10px;letter-spacing:1px;color:var(--muted);}
  .track{display:flex;gap:2px;flex-wrap:wrap;margin-top:18px;}
  .seg{flex:1 1 12px;min-width:8px;height:22px;border-radius:3px;background:var(--line);transition:background .2s,transform .1s;cursor:pointer;}
  .seg:active{transform:scale(.9);}
  .seg.done{background:var(--done);}
  .seg.today{outline:2px solid var(--gold);outline-offset:1px;}
  .pill{display:inline-block;font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:1px;border-radius:20px;padding:2px 10px;margin-bottom:6px;}
  ul.list{list-style:none;padding:0;margin:8px 0 0;}
  ul.list li{font-size:14px;padding:5px 0;display:flex;align-items:flex-start;line-height:1.35;}
  ul.list li .b{margin-right:8px;}
  .note{font-size:13px;color:var(--gold);margin-top:8px;font-style:italic;}
  .btn{border:none;border-radius:12px;font-family:var(--cond);font-weight:700;letter-spacing:.5px;cursor:pointer;transition:filter .12s,transform .08s;}
  .btn:hover{filter:brightness(1.08);} .btn:active{transform:translateY(1px);}
  .primary{width:100%;height:48px;font-size:18px;margin-top:14px;background:var(--done);color:#06231B;}
  .mini{height:44px;padding:0 18px;font-size:16px;background:var(--done);color:#06231B;}
  input{height:44px;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:0 12px;font-family:var(--body);font-size:15px;outline:none;flex:1;min-width:100px;}
  input:focus{border-color:var(--done);}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .lost{font-family:var(--cond);font-size:40px;font-weight:700;color:var(--done);}
  .lostU{font-family:var(--cond);font-size:18px;color:var(--muted);margin-left:6px;}
  .bar{height:8px;background:var(--line);border-radius:6px;margin-top:10px;overflow:hidden;}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--done),var(--cardio));border-radius:6px;}
  .barcap{font-size:11px;color:var(--muted);margin-top:5px;}
  .weekLabel{font-family:var(--cond);font-size:12px;letter-spacing:2px;color:var(--muted);font-weight:600;margin:10px 0 4px;}
  .dayRow{display:flex;align-items:center;gap:12px;padding:10px 6px;cursor:pointer;border-radius:8px;border-bottom:1px solid var(--line);}
  .dayRow:active{background:var(--panel2);}
  .check{width:26px;height:26px;border-radius:13px;flex-shrink:0;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;}
  .check.on{background:var(--done);border-color:var(--done);color:#06231B;font-weight:700;font-size:14px;}
  .dnum{width:32px;font-family:var(--cond);font-weight:700;font-size:18px;}
  .dname{flex:1;min-width:0;font-size:14px;font-weight:500;}
  .kdot{width:8px;height:8px;border-radius:4px;flex-shrink:0;}
  .modeTog{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--bg);}
  .modeTog button{font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:1px;color:var(--muted);background:transparent;border:none;padding:6px 12px;cursor:pointer;transition:background .15s,color .15s;}
  .modeTog button.on{background:var(--cardio);color:#06212E;}
  .homeTag{font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--cardio);border:1px solid var(--cardio);border-radius:10px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
  .detail{padding:2px 0 12px 58px;}
  .strike{text-decoration:line-through;color:var(--muted);}
  .ghost{background:none;border:none;color:var(--muted);font-family:var(--body);font-size:13px;text-decoration:underline;padding:4px 8px;cursor:pointer;}
  .foot{text-align:center;margin-top:4px;}
  .footnote{font-size:11px;color:var(--line);margin-top:10px;line-height:1.5;}
  @media(max-width:520px){.hero{flex-direction:column;align-items:flex-start;}.stats{width:100%;}}
</style>
</head>
<body>
<div class="eyebrow">SOLE PROPRIETOR OF SUFFERING · EAST VALLEY</div>
<h1>45-DAY KICKSTART</h1>
<div class="sub">Fat loss · Legs · Low-impact cardio</div>
<div id="app"></div>

<script>
(function(){
  "use strict";
  var KEY="kickstart_state_v1";
  var C={legs:"var(--legs)",cardio:"var(--cardio)",upper:"var(--upper)",recovery:"var(--recovery)",finish:"var(--finish)"};
  var KIND={legs:{l:"LEGS",c:"var(--legs)"},cardio:{l:"CARDIO",c:"var(--cardio)"},upper:{l:"UPPER + CORE",c:"var(--upper)"},recovery:{l:"RECOVERY",c:"var(--recovery)"},finish:{l:"FINISH",c:"var(--finish)"}};

  // ---- GYM versions ----
  var LEGS_A=["Goblet / barbell squat — 3×8–10","Leg press — 3×10–12","Back extension — 3×12–15","Standing calf raise — 3×15","Plank — 3×20–40 sec"];
  var LEGS_B=["Romanian deadlift — 3×8–10","Walking lunge — 3×8/leg","Leg curl — 3×12","Glute bridge — 3×15","Dead bug — 3×10/side"];
  var UPPER=["Chest press / push-ups — 3×8–12","Lat pulldown / rows — 3×8–12","Overhead press — 3×10","Face pull / band pull-apart — 3×15","Leg raise — 3×12","Side plank — 3×20 sec/side"];
  var INT={1:"5 min warmup → [1 min hard / 2 min easy] ×6 → 5 min cooldown",2:"5 min warmup → [90 sec hard / 2 min easy] ×6 → cooldown",3:"5 min warmup → [2 min hard / 2 min easy] ×7 → cooldown",4:"5 min warmup → [2 min hard / 90 sec easy] ×8 → cooldown",5:"5 min warmup → [3 min hard / 2 min easy] ×6 → cooldown",6:"5 min warmup → [3 min hard / 90 sec easy] ×7 → cooldown"};

  // ---- HOME versions (dumbbells + bench + kettlebell + walking pad) ----
  var H_LEGS_A=["Goblet squat (DB or KB) — 3×10–12","Bulgarian split squat, rear foot on bench — 3×8/leg","DB Romanian deadlift — 3×10–12","Standing calf raise, DB in hand — 3×15","Plank — 3×20–40 sec"];
  var H_LEGS_B=["Kettlebell swing — 3×15","DB reverse lunge — 3×8/leg","Single-leg DB Romanian deadlift — 3×8/leg","DB or KB hip thrust on bench — 3×12","Dead bug — 3×10/side"];
  var H_UPPER=["DB bench press (on bench) — 3×8–12","One-arm DB row, hand on bench — 3×10/side","DB overhead press — 3×10","Bent-over reverse fly — 3×15","Leg raise — 3×12","Side plank — 3×20 sec/side"];
  var weekOf=function(d){return Math.min(6,Math.ceil(d/7));};

  function buildPlan(){
    var p=[];
    // GYM cardio
    var steady=function(m){return [m+" min steady, conversational pace","Elliptical, or incline treadmill walk at 8–12%","Keep the pace honest — no coasting"];};
    var longSteady=function(m){return [m+" min long steady session","Elliptical or incline walk — your endurance builder","Add ~5 min vs last week when it feels easy"];};
    var recovery=["Walk ~20 min, very easy","Full-body mobility / stretch","This is how your legs actually recover"];
    // HOME cardio (walking pad)
    var hSteady=function(m){return [m+" min brisk walk on the pad","Steady pace you can still talk at","Throw on a show — it flies by"];};
    var hLong=function(m){return [m+" min long walk on the pad","Easy conversational pace — pure base building","Longest session of the week; the pad's perfect for it"];};
    var hRecovery=["20 min easy walk on the pad","Full-body mobility / stretch","Keep it gentle — this is recovery"];
    var hInt=function(d){return [INT[weekOf(d)],"Pad at its fastest brisk pace for the 'hard' blocks (add incline if it has it)","If the pad's too slow to get hard, swap each hard block for 15 kettlebell swings"];};

    var layout=[
      ["Legs A","legs",function(){return LEGS_A;},function(){return H_LEGS_A;}],
      ["Cardio intervals","cardio",function(d){return [INT[weekOf(d)],"Hard = you can only get a few words out","Crank resistance, or bump incline & walk fast"];},hInt],
      ["Upper + Core","upper",function(){return UPPER;},function(){return H_UPPER;}],
      ["Steady cardio","cardio",function(d){return steady(weekOf(d)>1?45:40);},function(d){return hSteady(weekOf(d)>1?45:40);}],
      ["Legs B","legs",function(){return LEGS_B;},function(){return H_LEGS_B;}],
      ["Long steady cardio","cardio",function(d){return longSteady(40+(weekOf(d)-1)*5);},function(d){return hLong(40+(weekOf(d)-1)*5);}],
      ["Active recovery","recovery",function(){return recovery;},function(){return hRecovery;}]
    ];
    for(var d=1;d<=42;d++){var t=layout[(d-1)%7];p.push({day:d,name:t[0],kind:t[1],detail:t[2](d),home:t[3](d)});}
    p.push({day:43,name:"Legs A — PR day",kind:"finish",detail:LEGS_A.slice(0,3).concat(["Push for a rep or weight PR vs Day 1"]),home:H_LEGS_A.slice(0,3).concat(["Push heavier DBs/KB than Day 1"]),note:"Prove how far you've come."});
    p.push({day:44,name:"Intervals — hardest yet",kind:"finish",detail:[INT[6],"Go all-in on the hard portions","Then celebrate — you earned it"],home:[INT[6],"Pad max pace + 15 kettlebell swings each hard block","Go all-in, then celebrate — you earned it"]});
    p.push({day:45,name:"Re-measure & reset",kind:"finish",detail:["Weigh in, same morning conditions","Retake your Day-1 photo","Note how much easier cardio feels now"],home:["Weigh in, same morning conditions","Retake your Day-1 photo","Note how much easier cardio feels now"],note:"Roll this same week into month 2."});
    return p;
  }
  var PLAN=buildPlan();

  var state={completed:{},startWeight:null,goalWeight:null,weights:[],modes:{}};
  try{var raw=localStorage.getItem(KEY);if(raw)state=Object.assign(state,JSON.parse(raw));}catch(e){}
  if(!state.modes)state.modes={};
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

  function modeOf(day){return state.modes[day]==="home"?"home":"gym";}
  function detailFor(p){return modeOf(p.day)==="home"?p.home:p.detail;}
  function modeToggle(day){
    var m=modeOf(day);
    return '<div class="modeTog">'
      +'<button class="'+(m==="gym"?"on":"")+'" data-mode="'+day+':gym">GYM</button>'
      +'<button class="'+(m==="home"?"on":"")+'" data-mode="'+day+':home">HOME</button>'
      +'</div>';
  }

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function doneCount(){return Object.keys(state.completed).length;}
  function currentDay(){for(var d=1;d<=45;d++)if(!state.completed[d])return d;return 45;}
  function streak(){var s=0;for(var d=1;d<=45;d++){if(state.completed[d])s++;else break;}return s;}

  var expanded=null;

  function detailList(det,color){
    var h='<ul class="list">';
    for(var i=0;i<det.length;i++)h+='<li><span class="b" style="color:'+color+'">▸</span>'+esc(det[i])+'</li>';
    return h+'</ul>';
  }

  function sparkline(w){
    if(w.length<2)return"";
    var W=300,H=46,pad=4,vals=w.map(function(x){return x.lbs;});
    var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=(max-min)||1;
    var pts=w.map(function(x,i){var px=pad+(i/(w.length-1))*(W-pad*2);var py=pad+(1-(x.lbs-min)/range)*(H-pad*2);return px.toFixed(1)+","+py.toFixed(1);});
    var dots=w.map(function(x,i){var xy=pts[i].split(",");return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="2.5" fill="var(--done)"/>';}).join("");
    return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:46px;margin-top:12px;display:block"><polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--done)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
  }

  function render(){
    var app=document.getElementById("app");
    var dc=doneCount(),cur=currentDay(),all=dc===45,pct=Math.round(dc/45*100),st=streak();
    var latest=state.weights.length?state.weights[state.weights.length-1].lbs:state.startWeight;
    var lost=(state.startWeight!=null&&latest!=null)?Math.max(0,state.startWeight-latest):0;
    var goalLoss=(state.startWeight!=null&&state.goalWeight!=null)?(state.startWeight-state.goalWeight):40;
    var wpct=goalLoss>0?Math.min(100,Math.round(lost/goalLoss*100)):0;
    var html="";

    // Hero
    html+='<div class="card"><div class="hero"><div>';
    html+='<div class="heroLabel">'+(all?"CHALLENGE":"TODAY IS")+'</div>';
    html+='<div><span class="bigNum">'+(all?"DONE":"DAY "+cur)+'</span>'+(all?"":'<span class="slash">/ 45</span>')+'</div></div>';
    html+='<div class="stats">';
    html+='<div class="stat"><b style="color:var(--done)">'+dc+'</b><span>DONE</span></div>';
    html+='<div class="stat"><b style="color:var(--gold)">'+st+'</b><span>STREAK</span></div>';
    html+='<div class="stat"><b style="color:var(--cardio)">'+pct+'%</b><span>COMPLETE</span></div>';
    html+='</div></div>';
    // Track
    html+='<div class="track">';
    for(var i=0;i<PLAN.length;i++){var d=PLAN[i].day;var cls="seg"+(state.completed[d]?" done":"")+((d===cur&&!all)?" today":"");html+='<div class="'+cls+'" data-toggle="'+d+'" title="Day '+d+'"></div>';}
    html+='</div></div>';

    // Today
    if(!all){
      var t=PLAN[cur-1],k=KIND[t.kind];
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
      html+='<div><span class="pill" style="color:'+k.c+';border:1px solid '+k.c+'">WK '+weekOf(cur)+' · '+k.l+'</span>';
      html+='<div class="cardTitle">'+esc(t.name)+'</div></div>';
      html+=modeToggle(cur);
      html+='</div>';
      html+=detailList(detailFor(t),k.c);
      if(t.note)html+='<div class="note">'+esc(t.note)+'</div>';
      html+='<button class="btn primary" data-toggle="'+cur+'">Mark Day '+cur+' done</button>';
      html+='</div>';
    }else{
      html+='<div class="card" style="text-align:center;border-color:var(--done)"><div style="font-family:var(--cond);font-size:28px;font-weight:700;color:var(--done)">ALL 45 DAYS LOGGED</div><div style="color:var(--muted);font-size:14px;margin-top:6px">That\'s the hard part — the habit\'s built. Keep the same weekly rhythm rolling into month 2.</div></div>';
    }

    // Weight
    html+='<div class="card"><div class="cardTitle">Weigh-in</div>';
    if(state.startWeight==null){
      html+='<div style="color:var(--muted);font-size:13px;margin:8px 0 10px">Set your numbers once. Weigh in weekly, not daily — same morning, same conditions.</div>';
      html+='<div class="row"><input id="sw" inputmode="decimal" placeholder="Start weight (lbs)"/><input id="gw" inputmode="decimal" placeholder="Goal (default −40)"/><button class="btn mini" data-setup="1">Set</button></div>';
    }else{
      html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px"><div><span class="lost">'+lost.toFixed(1)+'</span><span class="lostU">lbs off</span></div><div style="text-align:right;font-size:12px;color:var(--muted)">'+(latest!=null?"Now "+latest+" · ":"")+'Goal '+state.goalWeight+'</div></div>';
      html+='<div class="bar"><div style="width:'+wpct+'%"></div></div>';
      html+='<div class="barcap">'+wpct+'% of your '+goalLoss+'-lb goal</div>';
      html+=sparkline(state.weights);
      html+='<div class="row" style="margin-top:12px"><input id="lw" inputmode="decimal" placeholder="Log today\'s weight"/><button class="btn mini" data-log="1">Log</button></div>';
    }
    html+='</div>';

    // Schedule
    html+='<div class="card"><div class="cardTitle">The 45 days</div><div style="margin-top:6px">';
    for(var wk=1;wk<=6;wk++){
      html+='<div class="weekLabel">WEEK '+wk+(wk===6?" + FINISH":"")+'</div>';
      for(var j=0;j<PLAN.length;j++){
        var p=PLAN[j];var inWk=wk<6?weekOf(p.day)===wk:p.day>35;if(!inWk)continue;
        var kk=KIND[p.kind],on=!!state.completed[p.day],open=expanded===p.day;
        html+='<div class="dayRow" data-expand="'+p.day+'">';
        html+='<div class="check'+(on?" on":"")+'" data-toggle="'+p.day+'">'+(on?"✓":"")+'</div>';
        html+='<div class="dnum" style="color:'+(on?"var(--muted)":"var(--ink)")+'">'+p.day+'</div>';
        html+='<div class="dname'+(on?" strike":"")+'">'+esc(p.name)+(modeOf(p.day)==="home"?' <span class="homeTag">HOME</span>':"")+'</div>';
        html+='<div class="kdot" style="background:'+kk.c+'"></div></div>';
        if(open){html+='<div class="detail">'+modeToggle(p.day)+detailList(detailFor(p),kk.c)+(p.note?'<div class="note">'+esc(p.note)+'</div>':"")+'</div>';}
      }
    }
    html+='</div></div>';

    // Footer
    html+='<div class="foot"><button class="ghost" data-reset="1">Reset everything</button><div class="footnote">Saves on this device. Weekly weigh-ins beat daily. Clear the running &amp; heavy lifting with a doctor if you\'ve got heart or joint history.</div></div>';

    app.innerHTML=html;
  }

  document.getElementById("app").addEventListener("click",function(e){
    var el=e.target;
    var modeBtn=el.closest?el.closest("[data-mode]"):null;
    if(modeBtn){e.stopPropagation();var parts=modeBtn.getAttribute("data-mode").split(":");var day=+parts[0],where=parts[1];if(where==="gym")delete state.modes[day];else state.modes[day]="home";save();render();return;}
    var toggle=el.closest?el.closest("[data-toggle]"):null;
    var expand=el.closest?el.closest("[data-expand]"):null;
    if(toggle){e.stopPropagation();var d=+toggle.getAttribute("data-toggle");if(state.completed[d])delete state.completed[d];else state.completed[d]=true;save();render();return;}
    if(el.getAttribute&&el.getAttribute("data-setup")){var s=parseFloat(document.getElementById("sw").value),g=parseFloat(document.getElementById("gw").value);if(!s||s<=0)return;state.startWeight=s;state.goalWeight=(g&&g>0)?g:Math.max(0,s-40);save();render();return;}
    if(el.getAttribute&&el.getAttribute("data-log")){var v=parseFloat(document.getElementById("lw").value);if(!v||v<=0)return;state.weights.push({day:currentDay(),lbs:v,ts:Date.now()});save();render();return;}
    if(el.getAttribute&&el.getAttribute("data-reset")){if(confirm("Clear all progress and weigh-ins?")){state={completed:{},startWeight:null,goalWeight:null,weights:[],modes:{}};expanded=null;save();render();}return;}
    if(expand){var dd=+expand.getAttribute("data-expand");expanded=expanded===dd?null:dd;render();return;}
  });

  render();
})();

// Register the service worker for offline support (relative path = subpath-safe).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){ /* offline / unsupported — app still runs */ });
  });
}
</script>
</body>
</html>
